name: CI

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (with retry)
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "npm ci attempt $attempt/3"
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "npm ci failed, retrying in 10s..."
              sleep 10
            fi
          done
          echo "npm ci failed after 3 attempts"
          exit 1

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Arabic Encoding Guard
        run: npm run check:arabic-encoding

      - name: Logic Flow Gate
        if: ${{ github.event_name == 'pull_request' }}
        env:
          LOGIC_FLOW_BASE_REF: ${{ github.base_ref }}
        run: npm run logic-flow:gate

      - name: Unit Tests
        run: npm run test:run

      - name: Build
        run: npm run build

name: Vercel Deploy

on:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm install --legacy-peer-deps

      - name: Verify Vercel Configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN is missing! Please add it to GitHub Secrets."
            exit 1
          fi
          echo "Vercel configuration verified."

      - name: Deploy to Vercel (Preview)
        if: github.ref != 'refs/heads/main'
        run: npx vercel --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_URGAR9qk4F6x6EdDj39dAZlF
          VERCEL_PROJECT_ID: prj_zJd5ooYLoZJkRCIHNlkjiQ53gGgH

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_URGAR9qk4F6x6EdDj39dAZlF
          VERCEL_PROJECT_ID: prj_zJd5ooYLoZJkRCIHNlkjiQ53gGgH

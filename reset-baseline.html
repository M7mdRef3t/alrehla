<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين البوصلة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2em;
        }

        button {
            background: linear-gradient(135deg, #2dd4bf, #3b82f6);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .success {
            background: rgba(45, 212, 191, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧭 إعادة تعيين البوصلة</h1>
        <div class="info">
            هذه الأداة ستمسح بيانات البوصلة المحفوظة، مما يسمح لك برؤية التصميم الجديد
        </div>
        <button onclick="resetBaseline()">مسح بيانات البوصلة</button>
        <button onclick="openApp()">فتح التطبيق</button>
        <div class="success" id="success">
            ✅ تم مسح البيانات بنجاح! الآن افتح التطبيق وابدأ رحلة جديدة
        </div>
    </div>

    <script>
        function resetBaseline() {
            try {
                // Clear baseline-related data from localStorage
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (
                        key.includes('baseline') ||
                        key.includes('journey') ||
                        key.includes('dawayir')
                    )) {
                        keysToRemove.push(key);
                    }
                }

                keysToRemove.forEach(key => {
                    console.log('Removing:', key);
                    localStorage.removeItem(key);
                });

                // Show success message
                document.getElementById('success').style.display = 'block';

                console.log('✅ Baseline data cleared successfully!');
                console.log('Removed keys:', keysToRemove);
            } catch (error) {
                alert('حدث خطأ: ' + error.message);
            }
        }

        function openApp() {
            window.open('http://localhost:3002', '_blank');
        }
    </script>
</body>

</html>

# SonarQube Configuration for Alrehla (دواير)

# Project identification
sonar.projectKey=alrehla
sonar.projectName=Alrehla - رحلة النمو الشخصي
sonar.projectVersion=0.1.0

# Source code location
sonar.sources=src,app
sonar.tests=e2e,src/**/*.test.ts,src/**/*.test.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/*.spec.tsx,**/dist/**,**/.next/**,**/out/**,**/build/**,**/coverage/**,**/*.config.ts,**/*.config.js

# Test exclusions
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/.next/**

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript specific
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.node.maxspace=8192

# Host URL (change if using cloud or different server)
# sonar.host.url=http://localhost:9000

# Authentication (use environment variables for security)
# sonar.token=${SONAR_TOKEN}

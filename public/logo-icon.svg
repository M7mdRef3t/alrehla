<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Awareness halos -->
  <path d="M56 86 A44 44 0 0 0 144 86" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" opacity="0.65" filter="url(#glow)"/>
  <path d="M38 86 A62 62 0 0 0 162 86" stroke="#14B8A6" stroke-width="1.5" stroke-linecap="round" opacity="0.38" filter="url(#glow)"/>
  <path d="M20 86 A80 80 0 0 0 180 86" stroke="#7C3AED" stroke-width="1"   stroke-linecap="round" opacity="0.18" filter="url(#glow)"/>
  <!-- Journey trail -->
  <path d="M38 176 Q100 168 162 176" stroke="#14B8A6" stroke-width="1.5" stroke-dasharray="5 4" stroke-linecap="round" opacity="0.3"/>
  <!-- Head -->
  <circle cx="100" cy="52" r="16" fill="url(#body)" filter="url(#glow)"/>
  <!-- Torso -->
  <rect x="88" y="70" width="24" height="32" rx="8" fill="url(#body)" opacity="0.95"/>
  <!-- Left arm -->
  <line x1="88"  y1="79" x2="63"  y2="95"  stroke="url(#body)" stroke-width="8" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="112" y1="79" x2="137" y2="93"  stroke="url(#body)" stroke-width="8" stroke-linecap="round"/>
  <!-- Left leg -->
  <path d="M93 102 L79 140 L66 159"    stroke="url(#body)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right leg -->
  <path d="M107 102 L120 138 L134 155" stroke="url(#body)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
